name: Deploy Application

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_USER: deployer
  APP_PATH: /home/deployer/apps

jobs:
  deploy-singleton:
    runs-on: ["self-hosted"]
    outputs:
      singleton-ip: ${{ steps.get-ip.outputs.ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SINGLETON_IP: ${{ secrets.SINGLETON_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SINGLETON_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Get singleton instance IP
        id: get-ip
        env:
          SINGLETON_IP: ${{ secrets.SINGLETON_IP }}
        run: |
          echo "ip=$SINGLETON_IP" >> $GITHUB_OUTPUT

      - name: Sync files via rsync
        env:
          SINGLETON_IP: ${{ secrets.SINGLETON_IP }}
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.env' \
            ./ $SERVER_USER@$SINGLETON_IP:$APP_PATH/

      - name: Install dependencies & build
        env:
          SINGLETON_IP: ${{ secrets.SINGLETON_IP }}
        run: |
          ssh $SERVER_USER@$SINGLETON_IP << 'EOF'
            export NVM_DIR="/home/deployer/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/deployer/apps
            npm install
            npm run build || true
          EOF

      - name: Restart PM2
        env:
          SINGLETON_IP: ${{ secrets.SINGLETON_IP }}
        run: |
          ssh $SERVER_USER@$SINGLETON_IP << 'EOF'
            export NVM_DIR="/home/deployer/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/deployer/apps
            pm2 restart all || pm2 start npm --name "app" -- start
            pm2 save
          EOF

      - name: Health check
        env:
          SINGLETON_IP: ${{ secrets.SINGLETON_IP }}
        run: |
          for i in {1..30}; do
            if curl -sf "https://kucing.los.my.id" > /dev/null; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

  deploy-asg:
    needs: deploy-singleton
    runs-on: ["self-hosted", "Linux", "X64", "gpu"]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Get ASG name
        id: get-asg
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query 'AutoScalingGroups[?contains(Tags[?Key==`Name`].Value, `asg`)].AutoScalingGroupName' \
            --output text | head -1)
          echo "asg-name=$ASG_NAME" >> $GITHUB_OUTPUT
          echo "ASG: $ASG_NAME"

      - name: Start Instance Refresh
        run: |
          ASG_NAME="${{ steps.get-asg.outputs.asg-name }}"
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 90, "InstanceWarmup": 300}'

      - name: Wait for instance refresh
        run: |
          ASG_NAME="${{ steps.get-asg.outputs.asg-name }}"
          for i in {1..60}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            echo "Refresh: $STATUS"
            [ "$STATUS" = "Successful" ] && exit 0
            [ "$STATUS" = "Failed" ] && exit 1
            sleep 30
          done
          echo "Timeout waiting for refresh"
          exit 1